<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 160 40" fill="none">
  <defs>
    <linearGradient id="vt-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
  </defs>
  <!-- "Vec" badge — rounded rect like LinkedIn's "in" box -->
  <g transform="translate(4,4)">
    <rect width="32" height="32" rx="4" fill="url(#vt-grad)"/>
    <text x="16" y="23" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-0.3">Vec</text>
  </g>
  <!-- "Trade" text — light weight, like LinkedIn's "linked" -->
  <text x="37" y="28.5" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.3" fill="#0E7490">Trade</text>
</svg>
